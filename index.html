<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>여행 투표</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:sans-serif;background:#f5f7fb;margin:0;padding:20px;}
.container{max-width:800px;margin:auto;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px;}
input{width:100%;padding:10px;margin:5px 0;}
button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;}
.primary{background:#2563eb;color:#fff;}
.green{background:#16a34a;color:#fff;}
.gray{background:#999;color:#fff;}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.small{font-size:12px;color:#666;}
</style>
</head>

<body>
<div class="container">

<h2>🏖 여행 투표 (안정형)</h2>

<div class="card">
  <h3>닉네임</h3>
  <input id="nameInput" placeholder="이름"/>
  <button class="primary" onclick="saveName()">저장</button>
</div>

<div class="card">
  <h3>여행지 추가</h3>
  <input id="placeName" placeholder="지역명"/>
  <input id="placeLink" placeholder="링크"/>
  <button class="primary" onclick="addPlace()">추가</button>
</div>

<div id="list"></div>

</div>

<script>

const SUPABASE_URL = "https://sxlehuikskjeputwjvsd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIs...";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let me = localStorage.getItem("me") || "";

function saveName(){
  me = document.getElementById("nameInput").value.trim();
  if(!me) return alert("이름 입력");
  localStorage.setItem("me", me);
  load();
}

async function load(){

  const {data: places} = await client.from("places").select("*");
  const {data: votes} = await client.from("votes").select("*");

  const list = document.getElementById("list");
  list.innerHTML = "";

  places.forEach(p=>{

    const voteCount =
      votes.filter(v=>v.place_id === p.id).length;

    const myVote =
      votes.find(v=>v.place_id === p.id && v.voter === me);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.name}</h3>
      <div class="small">작성자: ${p.creator}</div>
      <a href="${p.link}" target="_blank">지도</a>

      <div class="row">
        <b>👍 ${voteCount}</b>

        ${
          myVote
          ? `<button class="gray" onclick="unvote(${myVote.id})">취소</button>`
          : `<button class="green" onclick="vote(${p.id})">투표</button>`
        }
      </div>

      ${
        p.creator === me
        ? `
          <div style="margin-top:10px">
            <button onclick="editPlace(${p.id})">수정</button>
            <button onclick="deletePlace(${p.id})">삭제</button>
          </div>
        `
        : ""
      }
    `;

    list.appendChild(div);
  });
}

async function addPlace(){
  if(!me) return alert("닉네임 먼저");

  const name = document.getElementById("placeName").value.trim();
  const link = document.getElementById("placeLink").value.trim();

  await client.from("places").insert({
    name,
    link,
    creator: me
  });

  load();
}

async function vote(place_id){
  if(!me) return alert("닉네임 먼저");

  await client.from("votes").insert({
    place_id,
    voter: me
  });

  load();
}

async function unvote(vote_id){
  await client.from("votes")
    .delete()
    .eq("id", vote_id);

  load();
}

async function deletePlace(id){
  await client.from("places")
    .delete()
    .eq("id", id);

  load();
}

async function editPlace(id){

  const newName = prompt("수정 이름");
  const newLink = prompt("수정 링크");

  if(!newName || !newLink) return;

  await client.from("places")
    .update({name:newName, link:newLink})
    .eq("id", id);

  load();
}

load();

client.channel("live")
.on("postgres_changes",{event:"*",schema:"public",table:"places"},load)
.on("postgres_changes",{event:"*",schema:"public",table:"votes"},load)
.subscribe();

</script>

</body>
</html>
