<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행지 투표</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:#f5f7fb;
}

.container{
  max-width:800px;
  margin:auto;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{background:#2563eb;color:#fff;}
.green{background:#16a34a;color:#fff;}
.gray{background:#aaa;color:#fff;}

.row{display:flex;justify-content:space-between;align-items:center;}
.small{font-size:12px;color:#666;}
</style>
</head>

<body>

<div class="container">

<h2>🏖 여행지 투표</h2>

<div class="card">
  <h3>닉네임</h3>
  <input id="nicknameInput" placeholder="이름 입력">
  <button class="primary" onclick="saveNickname()">저장</button>
</div>

<div class="card">
  <h3>여행지 추가</h3>
  <input id="name" placeholder="지역명">
  <input id="link" placeholder="지도 링크">
  <button class="primary" onclick="addPlace()">추가</button>
</div>

<div id="list"></div>

</div>

<script>

const SUPABASE_URL = "https://sxlehuikskjeputwjvsd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4bGVodWlrc2tqZXB1dHdqdnNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMTkyMTksImV4cCI6MjA5NzU5NTIxOX0.HHjAQisaFyx5Nj9tJ3ZZxm5GZbIhnaHlb8WjEBoVM4M";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let myName = localStorage.getItem("nickname") || "";

function saveNickname(){
  myName = document.getElementById("nicknameInput").value.trim();
  if(!myName) return alert("닉네임 입력");

  localStorage.setItem("nickname", myName);
  alert("저장됨");
  load();
}

async function load(){

  const {data: places} = await client.from("places").select("*");
  const {data: votes} = await client.from("votes").select("*");

  const list = document.getElementById("list");
  list.innerHTML = "";

  places.forEach(p=>{

    const voteCount = votes.filter(v=>v.place_id === p.id).length;
    const myVote = votes.find(v=>v.place_id === p.id && v.voter === myName);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.name}</h3>
      <div class="small">작성자: ${p.creator}</div>
      <a href="${p.link}" target="_blank">지도보기</a>

      <div class="row">
        <b>👍 ${voteCount}</b>

        ${
          myVote
          ? `<button class="gray" onclick="unvote(${myVote.id})">취소</button>`
          : `<button class="green" onclick="vote(${p.id})">투표</button>`
        }
      </div>

      ${
        p.creator === myName
        ? `
          <div style="margin-top:10px">
            <button onclick="editPlace(${p.id}, '${p.name}', '${p.link}')">수정</button>
            <button onclick="deletePlace(${p.id})">삭제</button>
          </div>
        `
        : ""
      }
    `;

    list.appendChild(div);
  });
}

async function addPlace(){

  if(!myName) return alert("닉네임 먼저 입력");

  const name = document.getElementById("name").value.trim();
  const link = document.getElementById("link").value.trim();

  if(!name || !link) return alert("입력 필요");

  await client.from("places").insert({
    name,
    link,
    creator: myName
  });

  load();
}

async function vote(place_id){

  if(!myName) return alert("닉네임 먼저 입력");

  await client.from("votes").insert({
    place_id,
    voter: myName
  });

  load();
}

async function unvote(vote_id){

  await client.from("votes")
    .delete()
    .eq("id", vote_id);

  load();
}

async function deletePlace(id){

  if(!confirm("삭제?")) return;

  await client.from("places")
    .delete()
    .eq("id", id);

  load();
}

async function editPlace(id, name, link){

  const newName = prompt("수정", name);
  const newLink = prompt("링크", link);

  if(!newName || !newLink) return;

  await client.from("places")
    .update({name:newName, link:newLink})
    .eq("id", id);

  load();
}

load();

client.channel("live")
.on("postgres_changes",{event:"*",schema:"public",table:"places"},load)
.on("postgres_changes",{event:"*",schema:"public",table:"votes"},load)
.subscribe();

</script>

</body>
</html>
